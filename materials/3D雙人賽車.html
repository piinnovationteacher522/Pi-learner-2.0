<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>A-Frame 雙人賽車遊戲 - 極速升級版</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body {
      margin: 0; padding: 0; overflow: hidden; background-color: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
    }
    .ui-panel {
      position: absolute;
      color: white;
      z-index: 10;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px 20px;
      border-radius: 8px;
      pointer-events: none;
      font-size: 1.2rem;
      font-weight: bold;
    }
    #ui-controls { top: 10px; left: 10px; font-size: 0.9rem; font-weight: normal; }
    #ui-p1 { top: 10px; left: 250px; border-bottom: 4px solid #E53935; }
    #ui-p2 { top: 10px; right: 10px; border-bottom: 4px solid #1E88E5; }
    
    #center-screen {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #FFEB3B;
      font-size: 4rem;
      font-weight: bold;
      text-shadow: 2px 2px 10px #000;
      z-index: 20;
      text-align: center;
      pointer-events: none;
    }
  </style>

  <script>
    const keys = {};
    window.addEventListener('keydown', (e) => { keys[e.code] = true; });
    window.addEventListener('keyup', (e) => { keys[e.code] = false; });

    const GAME = {
      state: 'WAITING',
      targetLaps: 4,
      laps: { p1: 0, p2: 0 }
    };

    // 遊戲管理員 (處理空白鍵與倒數)
    AFRAME.registerComponent('game-manager', {
      init: function() {
        this.centerUI = document.getElementById('center-screen');
        window.addEventListener('keydown', (e) => {
          if (e.code === 'Space' && GAME.state === 'WAITING') {
            this.startCountdown();
          }
        });
      },
      startCountdown: function() {
        GAME.state = 'COUNTDOWN';
        let count = 3;
        this.centerUI.innerText = count;
        
        let timer = setInterval(() => {
          count--;
          if (count > 0) {
            this.centerUI.innerText = count;
          } else if (count === 0) {
            this.centerUI.innerText = "GO!";
            GAME.state = 'RACING';
          } else {
            this.centerUI.innerText = "";
            clearInterval(timer);
          }
        }, 1000);
      }
    });

    // 車輛控制與物理組件
    AFRAME.registerComponent('car-controller', {
      schema: {
        playerId: { type: 'string' },
        otherCarId: { type: 'string' },
        forwardKey: { type: 'string' },
        backwardKey: { type: 'string' },
        leftKey: { type: 'string' },
        rightKey: { type: 'string' },
        
        // --- 速度大幅提升 ---
        accel: { type: 'number', default: 0.035 },    // 加速度變快
        maxSpeed: { type: 'number', default: 0.8 },   // 最高時速翻倍
        friction: { type: 'number', default: 0.92 },  // 摩擦力維持
        turnSpeed: { type: 'number', default: 4.5 }   // 轉彎速度變快，對應高速行駛
      },
      init: function () {
        this.velocity = 0;
        this.progress = 0; // 進度追蹤：用來判定是否確實繞完一圈
        this.lapUI = document.getElementById(`ui-${this.data.playerId}`);
      },
      tick: function (time, timeDelta) {
        if (!timeDelta) return;
        
        let el = this.el;
        let pos = el.getAttribute('position');
        let rot = el.getAttribute('rotation');

        if (GAME.state === 'RACING') {
          if (keys[this.data.forwardKey]) this.velocity -= this.data.accel;
          if (keys[this.data.backwardKey]) this.velocity += this.data.accel;
          
          this.velocity = Math.max(-this.data.maxSpeed, Math.min(this.data.maxSpeed, this.velocity));

          if (Math.abs(this.velocity) > 0.01) {
            let turnDir = this.velocity < 0 ? 1 : -1;
            if (keys[this.data.leftKey]) rot.y += this.data.turnSpeed * turnDir * (timeDelta / 16.6);
            if (keys[this.data.rightKey]) rot.y -= this.data.turnSpeed * turnDir * (timeDelta / 16.6);
            el.setAttribute('rotation', rot);
          }
        }

        this.velocity *= this.data.friction;
        if (Math.abs(this.velocity) < 0.001) {
          this.velocity = 0;
          return;
        }

        let angle = THREE.MathUtils.degToRad(rot.y);
        let dx = Math.sin(angle) * this.velocity * (timeDelta / 16.6);
        let dz = Math.cos(angle) * this.velocity * (timeDelta / 16.6);
        let nextPos = { x: pos.x + dx, y: pos.y, z: pos.z + dz };

        // 碰撞偵測 1: 內外圈牆壁
        let distFromCenter = Math.hypot(nextPos.x, nextPos.z);
        if (distFromCenter < 10.8 || distFromCenter > 19.2) {
          this.velocity = -this.velocity * 0.6; 
          return; 
        }

        // 碰撞偵測 2: 兩車相撞
        let otherCar = document.getElementById(this.data.otherCarId);
        if (otherCar) {
          let otherPos = otherCar.getAttribute('position');
          let distToOther = Math.hypot(nextPos.x - otherPos.x, nextPos.z - otherPos.z);
          if (distToOther < 1.8) {
            this.velocity = -this.velocity * 0.8; 
            return;
          }
        }

        // 更新座標
        pos.x = nextPos.x;
        pos.z = nextPos.z;
        el.setAttribute('position', pos);

        // 呼叫嚴謹的計圈邏輯
        this.checkLap(pos);
      },

      checkLap: function(pos) {
        if (GAME.state !== 'RACING') return;

        // 將賽道分為四個象限區塊
        let currentZone = -1;
        if (pos.x < 0 && pos.z < 0) currentZone = 0; // 左上 (跨越起點線後)
        else if (pos.x > 0 && pos.z < 0) currentZone = 1; // 右上
        else if (pos.x > 0 && pos.z > 0) currentZone = 2; // 右下
        else if (pos.x < 0 && pos.z > 0) currentZone = 3; // 左下 (起點線前，玩家初始位置)

        // 依序檢查玩家是否通過每一個檢查點 (防作弊機制)
        if (this.progress === 0 && currentZone === 0) {
          // 開局第一次跨越起點線，只算起跑，不加圈數
          this.progress = 1; 
        } else if (this.progress === 1 && currentZone === 1) {
          this.progress = 2;
        } else if (this.progress === 2 && currentZone === 2) {
          this.progress = 3;
        } else if (this.progress === 3 && currentZone === 3) {
          this.progress = 4; // 準備回到終點
        } else if (this.progress === 4 && currentZone === 0) {
          // 確實繞完一圈，再次跨越起點線！
          this.progress = 1; // 重置進度，準備下一圈
          
          GAME.laps[this.data.playerId]++;
          this.lapUI.innerText = `P${this.data.playerId === 'p1' ? 1 : 2} 圈數: ${GAME.laps[this.data.playerId]} / ${GAME.targetLaps}`;

          // 獲勝判定
          if (GAME.laps[this.data.playerId] >= GAME.targetLaps) {
            GAME.state = 'FINISHED';
            let winnerColor = this.data.playerId === 'p1' ? '#E53935' : '#1E88E5';
            this.lapUI.innerText = "🏆 冠軍 🏆";
            document.getElementById('center-screen').innerHTML = `<span style="color:${winnerColor}">🏁 Player ${this.data.playerId === 'p1' ? 1 : 2} 獲勝! 🏁</span>`;
          }
        }
      }
    });
  </script>
</head>
<body>

  <div id="ui-controls" class="ui-panel">
    <p>🟥 <b>Player 1</b>: W, A, S, D</p>
    <p>🟦 <b>Player 2</b>: ↑, ↓, ←, →</p>
  </div>
  <div id="ui-p1" class="ui-panel">P1 圈數: 0 / 4</div>
  <div id="ui-p2" class="ui-panel">P2 圈數: 0 / 4</div>
  <div id="center-screen">按下 空白鍵 (Space) 開始比賽</div>

  <a-scene game-manager>
    <a-entity camera position="0 40 0" rotation="-90 0 0"></a-entity>

    <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#4CAF50"></a-plane>
    <a-ring position="0 0.1 0" rotation="-90 0 0" radius-inner="10" radius-outer="20" color="#333333"></a-ring>
    <a-torus position="0 0.5 0" rotation="90 0 0" radius="10" tube="0.2" color="#FFC107"></a-torus>
    <a-torus position="0 0.5 0" rotation="90 0 0" radius="20" tube="0.2" color="#FFC107"></a-torus>

    <a-entity position="-15 0 0">
      <a-plane position="0 0.11 0" rotation="-90 0 0" width="10" height="1.2" color="#FFFFFF"></a-plane>
      <a-plane position="0 0.12 0.3" rotation="-90 0 0" width="10" height="0.3" color="#000000"></a-plane>
      <a-plane position="0 0.12 -0.3" rotation="-90 0 0" width="10" height="0.3" color="#000000"></a-plane>
      
      <a-cylinder position="-4.5 2 0" radius="0.2" height="4" color="#FFEB3B"></a-cylinder>
      <a-cylinder position="4.5 2 0" radius="0.2" height="4" color="#FFEB3B"></a-cylinder>
      <a-box position="0 4 0" width="10" height="0.5" depth="0.5" color="#FFEB3B"></a-box>
      
      <a-text value="START / FINISH" position="0 4.3 0" align="center" color="#FFFFFF" scale="2.5 2.5 2.5" rotation="-90 0 0"></a-text>
    </a-entity>

    <a-box id="p1" position="-13 0.5 3" rotation="0 0 0" width="1" height="0.6" depth="2" color="#E53935"
           car-controller="playerId: p1; otherCarId: p2; forwardKey: KeyW; backwardKey: KeyS; leftKey: KeyA; rightKey: KeyD;">
      <a-box position="0 0.3 -0.8" width="0.8" height="0.2" depth="0.2" color="#FFEB3B"></a-box>
    </a-box>

    <a-box id="p2" position="-17 0.5 3" rotation="0 0 0" width="1" height="0.6" depth="2" color="#1E88E5"
           car-controller="playerId: p2; otherCarId: p1; forwardKey: ArrowUp; backwardKey: ArrowDown; leftKey: ArrowLeft; rightKey: ArrowRight;">
      <a-box position="0 0.3 -0.8" width="0.8" height="0.2" depth="0.2" color="#FFEB3B"></a-box>
    </a-box>

    <a-light type="ambient" color="#fff" intensity="0.6"></a-light>
    <a-light type="directional" position="-10 20 10" intensity="0.8" castShadow="true"></a-light>
  </a-scene>

</body>
</html>
